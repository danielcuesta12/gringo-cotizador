<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup · Rediseño del card KDS</title>
<style>
  :root{--bg:#0f1115;--card:#15110f;--line:#3a2420;--text:#F5E6D0;--mut:#9a9088;
        --green:#4ade80;--orange:#fb923c;--red:#f87171;--salir:#3b82f6;--brand:#FCDA13;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:var(--text);padding:22px 16px 60px}
  .wrap{max-width:1040px;margin:0 auto}
  h1{font-size:18px;font-weight:900;margin-bottom:4px}
  .sub{font-size:13px;color:var(--mut);margin-bottom:18px;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

  .kc{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .kc.red{border-color:rgba(248,113,113,.5)} .kc.orange{border-color:rgba(251,146,60,.45)} .kc.green{border-color:rgba(74,222,128,.4)}
  .kc.salir{box-shadow:0 0 0 2px var(--salir),0 8px 22px rgba(59,130,246,.35)}

  /* Fila 1: tiempo grande + cohete */
  .row-top{display:flex;align-items:center;gap:10px;padding:10px 14px}
  .row-top.red{background:rgba(248,113,113,.14)} .row-top.orange{background:rgba(251,146,60,.13)} .row-top.green{background:rgba(74,222,128,.12)} .row-top.gray{background:rgba(255,255,255,.05)}
  .tm{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .tm.red{color:var(--red)} .tm.orange{color:var(--orange)} .tm.green{color:var(--green)}
  .pay{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:800;color:var(--brand)}
  .salir-btn{margin-left:auto;flex-shrink:0;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(59,130,246,.18);border:2px solid rgba(59,130,246,.55);cursor:pointer}
  .salir-btn.on{background:var(--salir);border-color:var(--salir);box-shadow:0 0 0 3px rgba(59,130,246,.3)}

  /* Fila 2: número + nombre + tag */
  .row-id{display:flex;align-items:center;gap:9px;padding:6px 14px 11px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .kon{font-size:19px;font-weight:900;color:var(--text);flex-shrink:0}
  .kname{font-size:15px;font-weight:700;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ktag{font-size:11px;font-weight:900;padding:3px 9px;border-radius:20px;color:#10131a;flex-shrink:0}
  .ktag.salon{background:#a78bfa} .ktag.deli{background:#38bdf8} .ktag.recojo{background:#34d399}

  /* Cuerpo: solo ítems */
  .kcb{padding:12px 14px}
  .ki{font-size:15px;margin-bottom:4px}.ki .q{color:var(--brand);font-weight:800;margin-right:5px}
  .kim{font-size:12px;color:var(--mut);margin:0 0 4px 22px}
  .knota{font-size:12px;color:var(--mut);font-style:italic;margin:2px 0 4px 22px}

  .kcf{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .bls{flex:1;background:rgba(74,222,128,.14);color:#86efac;border:1px solid rgba(74,222,128,.4);border-radius:9px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
  .bls.red{background:rgba(248,113,113,.14);color:#fca5a5;border-color:rgba(248,113,113,.4)}
  .bac{flex:1;background:var(--brand);color:#000;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:800;cursor:pointer}
  .bcl{width:48px;background:rgba(255,255,255,.06);color:#aaa;border:1px solid var(--line);border-radius:9px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1>🍳 Rediseño del card KDS</h1>
  <div class="sub">Fila 1 (grande): <b>tiempo + 🚀</b> · Fila 2: <b>#número · nombre · tag</b> · Cuerpo: <b>solo el pedido</b>. Toca el 🚀 para ver el estado “por salir”.</div>

  <div class="grid" id="grid"></div>
</div>

<script>
  var CARDS = [
    {id:36, est:'prep', cl:'green', t:'01:16', name:'Mostrador', tag:'salon', tagl:'SALÓN', items:[['1','BBQ Smash']]},
    {id:42, est:'prep', cl:'red', t:'16:25', name:'Mostrador', tag:'salon', tagl:'SALÓN', items:[['1','Salchipapa Dirty Style'],['1','Salchipapa'],['1','Crispy Tenders'],['1','BBQ Smash'],['1','Royal Smash']]},
    {id:44, est:'prep', cl:'orange', t:'10:48', name:'Daniel', tag:'salon', tagl:'SALÓN', salir:true, items:[['1','Gringo Smash']]},
    {id:13, est:'pend', cl:'gray', name:'Mostrador', tag:'salon', tagl:'SALÓN', items:[['1','Gringo Smash','sin cebolla'],['1','Signature Smash']]},
    {id:51, est:'prep', cl:'green', t:'02:30', name:'Mesa 7', tag:'deli', tagl:'DELIVERY', items:[['2','Oklahoma Smash'],['1','Limonada']]},
  ];
  function card(c){
    var ip=c.est==='pend';
    var top = '<div class="row-top '+c.cl+'">'+
      (ip ? '<span class="pay">💳 Esperando pago</span>' : '<span class="tm '+c.cl+'">'+c.t+'</span>')+
      (ip ? '' : '<button class="salir-btn'+(c.salir?' on':'')+'" title="Por salir">🚀</button>')+'</div>';
    var idrow = '<div class="row-id"><span class="kon">#'+('00'+c.id).slice(-3)+'</span><span class="kname">'+c.name+'</span><span class="ktag '+c.tag+'">'+c.tagl+'</span></div>';
    var body = '<div class="kcb">'+c.items.map(function(i){ return '<div class="ki"><span class="q">'+i[0]+'x</span>'+i[1]+'</div>'+(i[2]?'<div class="knota">Nota: '+i[2]+'</div>':''); }).join('')+'</div>';
    var foot = '<div class="kcf">'+(ip
      ? '<button class="bac">Aceptar</button><button class="bcl">✕</button>'
      : '<button class="bls '+c.cl+'">LISTO</button><button class="bcl">✕</button>')+'</div>';
    return '<div class="kc '+c.cl+(c.salir?' salir':'')+'">'+top+idrow+body+foot+'</div>';
  }
  document.getElementById('grid').innerHTML = CARDS.map(card).join('');
  document.querySelectorAll('.salir-btn').forEach(function(b){ b.addEventListener('click',function(){ b.classList.toggle('on'); b.closest('.kc').classList.toggle('salir'); }); });
</script>
</body>
</html>
